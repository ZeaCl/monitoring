route:
  receiver: "default"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: "default"

receivers:
  - name: "default"
    slack_configs: []
    # TODO: configurar Slack/email cuando tengamos webhook
    # slack_configs:
